name: Bug 报告
description: 报告可复现的问题
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈问题。请尽量提供可复现信息，并在提交前隐藏 Token、API Key、邮箱和个人财务数据。
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 简要说明发生了什么，以及你预期应该发生什么。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开 ...
        2. 点击 ...
        3. 输入 ...
        4. 看到错误 ...
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 环境
      placeholder: "OS、Java、Node.js、浏览器、数据库"
  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 请先脱敏后再粘贴。
      render: text
