name: 功能建议
description: 提出新功能或改进建议
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题？
      description: 请从用户场景和痛点说明，不要只描述实现方式。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 说明你希望项目如何支持这个场景。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 如果考虑过其他方案，请列出来。
  - type: textarea
    id: context
    attributes:
      label: 补充上下文
      description: 可以附截图、草图或相关链接。
