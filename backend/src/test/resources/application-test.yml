server:
  port: 0

spring:
  datasource:
    url: jdbc:h2:mem:ai_accountant_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql
  jackson:
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt:
    secret: test_secret_1234567890_test_secret_1234567890
    expires-in: 1h
  ai:
    api-key: test-api-key
    base-url: https://api.openai.com/v1
    model: gpt-test
    base-url-allowlist: api.openai.com
  cors:
    allowed-origins: http://localhost:3000
