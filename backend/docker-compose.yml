services:
  mysql:
    image: mysql:8.4
    container_name: ai-accountant-backend-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: ai_accountant
      MYSQL_USER: ai_accountant
      MYSQL_PASSWORD: ai_accountant
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./src/main/resources/db/mysql/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_0900_ai_ci"]

volumes:
  mysql-data:
